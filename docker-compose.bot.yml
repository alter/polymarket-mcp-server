version: '3.8'

services:
  polymarket-ws-bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: polymarket-ws-bot
    image: polymarket-ws-bot:latest
    
    # Load configuration from our bot-specific env file
    env_file:
      - .env.bot
      
    # Mount local data directory AND source code so changes survive rebuilds
    volumes:
      - ./bot-data:/app/data
      - ./multi_strategy.py:/app/multi_strategy.py
      - ./oil_iran_trader.py:/app/oil_iran_trader.py
      - ./run_all_bots.sh:/app/run_all_bots.sh
      - ./meta_predict.py:/app/meta_predict.py
      - ./always_no_bot.py:/app/always_no_bot.py
      - ./whale_fade_bot.py:/app/whale_fade_bot.py
      - ./live_validator.py:/app/live_validator.py
      - ./orderbook_collector.py:/app/orderbook_collector.py
      - ./watchdog.py:/app/watchdog.py
      - ./phase3_obi_backtest.py:/app/phase3_obi_backtest.py
      - ./theta_decay_bot.py:/app/theta_decay_bot.py
      - ./political_skeptic_bot.py:/app/political_skeptic_bot.py
      - ./news_monitor.py:/app/news_monitor.py
      - ./news_trader_bot.py:/app/news_trader_bot.py
      - ./daily_report.py:/app/daily_report.py
      - ./whale_follower_bot.py:/app/whale_follower_bot.py
      - ./subpenny_lottery_bot.py:/app/subpenny_lottery_bot.py
      - ./tail_drift_bot.py:/app/tail_drift_bot.py
      - ./council_bot.py:/app/council_bot.py

    # Override CMD to run both bots in parallel
    command: ["bash", "/app/run_all_bots.sh"]
      
    # Auto-restart if script crashes or system reboots
    restart: unless-stopped
    
    # Optional resource constraints 
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          memory: 256M

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
